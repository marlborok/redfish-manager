<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<title>Redfish Manager</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root { --ok:#2e9e5b; --warn:#d98c00; --crit:#d0342c; --bg:#f4f6f8; --card:#fff; }
  * { box-sizing:border-box; }
  body { margin:0; font-family:"Segoe UI",system-ui,sans-serif; background:var(--bg); color:#222; }
  header { background:#1b2a41; color:#fff; padding:14px 24px; display:flex; align-items:center; gap:12px; }
  header h1 { font-size:18px; margin:0; }
  header .right { margin-left:auto; display:flex; align-items:center; gap:14px; }
  header .ts { font-size:12px; opacity:.7; }
  .lang-toggle { display:flex; border:1px solid rgba(255,255,255,.35); border-radius:6px; overflow:hidden; }
  .lang-toggle button { background:transparent; color:#fff; border:none; padding:4px 10px; cursor:pointer; font-size:12px; }
  .lang-toggle button.active { background:#fff; color:#1b2a41; font-weight:600; }
  main { padding:20px 24px; max-width:1100px; margin:0 auto; }
  .card { background:var(--card); border-radius:10px; box-shadow:0 1px 3px rgba(0,0,0,.08); padding:18px 20px; margin-bottom:18px; }
  .row { display:flex; flex-wrap:wrap; gap:24px; }
  .kv { min-width:150px; }
  .kv .k { font-size:12px; color:#777; }
  .kv .v { font-size:15px; font-weight:600; }
  .badge { display:inline-block; padding:2px 10px; border-radius:12px; color:#fff; font-size:12px; font-weight:600; }
  .badge.ok { background:var(--ok); } .badge.warn { background:var(--warn); }
  .badge.crit { background:var(--crit); } .badge.off { background:#888; }
  table { border-collapse:collapse; width:100%; font-size:13px; }
  th, td { text-align:left; padding:5px 10px; border-bottom:1px solid #eee; }
  th { color:#666; font-weight:600; background:#fafafa; }
  .temp-hot { color:var(--crit); font-weight:700; }
  .cols { display:grid; grid-template-columns:1fr 1fr; gap:18px; }
  @media (max-width:800px){ .cols { grid-template-columns:1fr; } }
  .power-btns button { margin-right:8px; margin-bottom:6px; padding:6px 14px; border:1px solid #ccc;
    border-radius:6px; background:#fff; cursor:pointer; font-size:13px; }
  .power-btns button:hover { background:#eef2f7; }
  .power-btns button.danger { border-color:var(--crit); color:var(--crit); }
  .msg { font-size:13px; margin-top:8px; }
  .err { color:var(--crit); }
  .muted { color:#999; font-size:13px; }
  form.add input { padding:6px 10px; border:1px solid #ccc; border-radius:6px; margin-right:8px; font-size:13px; }
  form.add button { padding:6px 16px; border:none; border-radius:6px; background:#1b2a41; color:#fff; cursor:pointer; }
  details.profile summary { cursor:pointer; font-size:13px; color:#666; }
  details.profile pre { font-size:11px; background:#f7f8fa; padding:10px; border-radius:6px; overflow:auto; max-height:280px; }
  dialog { border:none; border-radius:12px; box-shadow:0 8px 30px rgba(0,0,0,.25); padding:22px 26px; width:420px; max-width:92vw; }
  dialog::backdrop { background:rgba(0,0,0,.35); }
  dialog h3 { margin:0 0 12px; font-size:16px; }
  dialog .field { margin:10px 0; font-size:13px; }
  dialog button.primary { background:#1b2a41; color:#fff; border:none; border-radius:6px; padding:7px 18px; cursor:pointer; }
  dialog button.plain { background:#fff; border:1px solid #ccc; border-radius:6px; padding:7px 14px; cursor:pointer; margin-left:8px; }
  .progress-outer { background:#eee; border-radius:8px; height:14px; overflow:hidden; margin-top:10px; }
  .progress-inner { background:var(--ok); height:100%; width:0%; transition:width .5s; }
</style>
</head>
<body>
<header>
  <h1>🖥️ Redfish Manager</h1>
  <div class="right">
    <span class="ts" id="lastUpdate"></span>
    <div class="lang-toggle">
      <button data-lang="zh" onclick="setLang('zh')">中文</button>
      <button data-lang="en" onclick="setLang('en')">EN</button>
    </div>
  </div>
</header>
<main>
  <div class="card">
    <form class="add" onsubmit="addDevice(event)">
      <input id="f-name" data-i18n-ph="ph_name" required>
      <input id="f-host" data-i18n-ph="ph_host" required>
      <input id="f-user" data-i18n-ph="ph_user" required>
      <input id="f-pass" data-i18n-ph="ph_pass" type="password" required>
      <button data-i18n="add_device"></button>
      <span class="msg" id="add-msg"></span>
    </form>
  </div>
  <div class="card" id="activityCard" style="display:none">
    <h3 style="font-size:14px;margin:0 0 8px" data-i18n="activity_log"></h3>
    <div style="max-height:180px;overflow:auto"><table id="activityTable"></table></div>
  </div>
  <div id="app"></div>
</main>

<dialog id="biosDialog">
  <h3 data-i18n="bios_update_title"></h3>
  <div class="field"><span data-i18n="device"></span>:<b id="bd-host"></b> · <span data-i18n="current_version"></span>:<b id="bd-version"></b> · <span data-i18n="power"></span>:<b id="bd-power"></b></div>
  <div class="field err" id="bd-power-warn" style="display:none" data-i18n="power_off_warn"></div>
  <div class="field"><input type="file" id="bd-file"></div>
  <div class="field"><label><input type="checkbox" id="bd-preserve" checked> <span data-i18n="backup_before_update"></span></label></div>
  <div class="field">
    <button class="primary" id="bd-start" onclick="startBiosUpdate()" data-i18n="start_update"></button>
    <button class="plain" onclick="closeBiosDialog()" data-i18n="close"></button>
    <button class="plain" onclick="biosBackupOnly()" data-i18n="backup_only"></button>
  </div>
  <div class="progress-outer" id="bd-bar-outer" style="display:none"><div class="progress-inner" id="bd-bar"></div></div>
  <div class="msg" id="bd-msg"></div>
  <hr style="margin:16px 0;border:none;border-top:1px solid #eee">
  <h3 data-i18n="bios_restore_title"></h3>
  <div class="field"><select id="bd-backup" style="width:100%;padding:6px;border:1px solid #ccc;border-radius:6px"></select></div>
  <div class="field">
    <button class="plain" style="margin-left:0" onclick="biosRestorePreview()" data-i18n="preview_diff"></button>
    <button class="primary" style="margin-left:8px" onclick="biosRestore()" data-i18n="restore_settings"></button>
  </div>
  <div id="bd-diff" style="max-height:180px;overflow:auto;font-size:12px"></div>
  <div class="msg" id="bd-restore-msg"></div>
</dialog>

<dialog id="logDialog" style="width:760px">
  <h3><span data-i18n="event_log"></span> <span class="muted" id="ld-host" style="font-weight:400;font-size:13px"></span></h3>
  <div class="field" style="display:flex;gap:8px;align-items:center">
    <select id="ld-service" style="flex:1;padding:6px;border:1px solid #ccc;border-radius:6px" onchange="loadLogEntries()"></select>
    <button class="plain" style="margin-left:0" onclick="loadLogEntries()" data-i18n="refresh"></button>
    <button class="plain" style="border-color:var(--crit);color:var(--crit)" onclick="clearLog()" data-i18n="clear_log"></button>
    <button class="plain" onclick="closeLogDialog()" data-i18n="close"></button>
  </div>
  <div class="msg" id="ld-msg"></div>
  <div style="max-height:420px;overflow:auto;margin-top:8px"><table id="ld-table"></table></div>
</dialog>

let lang = localStorage.getItem("rf_lang") || "zh";

function t(key, ...args) {
  let s = (I18N[lang] && I18N[lang][key]) ?? (I18N.zh[key] ?? key);
  return s.replace(/\{(\d+)\}/g, (_, i) => args[i] ?? "");
}
function resetLabel(type) { return I18N[lang]["rt_" + type] ?? type; }

function applyStatic() {
  document.documentElement.lang = lang === "zh" ? "zh-Hant" : "en";
  document.querySelectorAll("[data-i18n]").forEach(el => {
    el.textContent = t(el.getAttribute("data-i18n"));
  });
  document.querySelectorAll("[data-i18n-ph]").forEach(el => {
    el.placeholder = t(el.getAttribute("data-i18n-ph"));
  });
  document.querySelectorAll(".lang-toggle button").forEach(b =>
    b.classList.toggle("active", b.getAttribute("data-lang") === lang));
}

function setLang(l) {
  lang = l;
  localStorage.setItem("rf_lang", l);
  applyStatic();
  refresh(true);
}

// ==================== helpers ====================
const healthClass = h => h === "OK" ? "ok" : (h === "Warning" ? "warn" : (h ? "crit" : "off"));
const esc = s => String(s ?? "–").replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const DANGEROUS = new Set(["ForceOff", "ForceRestart", "PowerCycle", "Nmi"]);

function sectionTable(title, headers, rows) {
  if (!rows.length) return "";
  return `<div><h3 style="font-size:14px;margin:14px 0 6px">${title}</h3>
    <div style="max-height:320px;overflow:auto"><table>
    <tr>${headers.map(h=>`<th>${h}</th>`).join("")}</tr>${rows.join("")}</table></div></div>`;
}

function renderSystem(sys, profileSys, devId) {
  const btns = (profileSys?.reset_types ?? []).map(type =>
    `<button class="${DANGEROUS.has(type)?'danger':''}" onclick="doReset(event,${devId},'${esc(sys.id)}','${type}')">${esc(resetLabel(type))}</button>`
  ).join("");
  return `
    <div class="row" style="align-items:center">
      <h2 style="margin:0;font-size:17px">${esc(sys.manufacturer)} ${esc(sys.model)}</h2>
      <span class="badge ${healthClass(sys.health)}">${t("health")}: ${esc(sys.health)}</span>
      <span class="badge ${sys.power_state==="On"?"ok":"off"}">${t("power")}: ${esc(sys.power_state)}</span>
    </div>
    <div class="row" style="margin-top:12px">
      <div class="kv"><div class="k">${t("serial")}</div><div class="v">${esc(sys.serial)}</div></div>
      <div class="kv"><div class="k">BIOS</div><div class="v">${esc(sys.bios_version)}</div></div>
      ${sys.cpu?.model ? `<div class="kv"><div class="k">CPU</div><div class="v">${esc(sys.cpu.model)}(×${sys.cpu.count})</div></div>` : ""}
      ${sys.memory_gib != null ? `<div class="kv"><div class="k">${t("memory")}</div><div class="v">${sys.memory_gib} GiB</div></div>` : ""}
    </div>
    ${btns ? `<div style="margin-top:14px" class="power-btns" data-dev="${devId}">
      <div class="k" style="font-size:12px;color:#777;margin-bottom:4px">${t("power_control")}</div>
      ${btns}
      <button style="border-color:#1b2a41;color:#1b2a41" onclick="openBiosDialog(${devId},'${esc(sys.bios_version)}')">${t("bios_update_btn")}</button>
      <button style="border-color:#1b2a41;color:#1b2a41" onclick="openLogDialog(${devId})">${t("event_log_btn")}</button>
      <div class="msg"></div></div>` : ""}`;
}

function renderChassis(ch) {
  const temps = [...(ch.temperatures ?? [])].sort((a,b)=>(b.celsius??0)-(a.celsius??0));
  const tempRows = temps.map(tp=>{
    const hot = tp.upper_critical && tp.celsius >= tp.upper_critical - 10;
    return `<tr><td>${esc(tp.name)}</td><td class="${hot?'temp-hot':''}">${tp.celsius} °C</td><td><span class="badge ${healthClass(tp.health)}">${esc(tp.health)}</span></td></tr>`;
  });
  const fanRows = (ch.fans ?? []).map(f=>`<tr><td>${esc(f.name)}</td><td>${f.rpm} RPM</td><td><span class="badge ${healthClass(f.health)}">${esc(f.health)}</span></td></tr>`);
  const psuRows = (ch.psus ?? []).map(p=>`<tr><td>${esc(p.name)}</td><td>${p.watts ?? "–"} W</td><td><span class="badge ${healthClass(p.health)}">${esc(p.health)}</span></td></tr>`);
  const sensorRows = (ch.sensors ?? []).map(s=>`<tr><td>${esc(s.name)}</td><td>${s.reading} ${esc(s.units ?? "")}</td><td>${esc(s.type)}</td><td><span class="badge ${healthClass(s.health)}">${esc(s.health)}</span></td></tr>`);
  const left = sectionTable(t("temp_sensors", esc(ch.id)), [t("col_sensor"),t("col_reading"),t("col_status")], tempRows);
  const right =
    sectionTable(t("fans"), [t("col_fan"),t("col_speed"),t("col_status")], fanRows) +
    sectionTable(t("psus"), [t("col_psu"),t("col_watts"),t("col_status")], psuRows) +
    sectionTable(t("other_sensors"), [t("col_name"),t("col_reading"),t("col_type"),t("col_status")], sensorRows);
  if (!left && !right) return "";
  return `<div class="cols" style="margin-top:16px">${left ? `<div>${left}</div>` : ""}${right ? `<div>${right}</div>` : ""}</div>`;
}

function renderDevice(dev) {
  const snap = dev.snapshot;
  const head = `<b>${esc(dev.name)}</b> <span class="muted">(${esc(dev.host)}${dev.profile ? ` · ${esc(dev.profile.vendor)} Redfish ${esc(dev.profile.redfish_version)}` : ""})</span>`;
  if (!snap) return `<div class="card">${head}<div class="muted">${t("no_data")}</div></div>`;
  if (!snap.ok) return `<div class="card">${head} <span class="badge crit">${t("conn_failed")}</span><div class="err msg">${esc(snap.error)}</div></div>`;
  const d = snap.data;
  const systems = (d.systems ?? []).map(sys => {
    const pSys = (dev.profile?.systems ?? []).find(p => p.id === sys.id);
    return renderSystem(sys, pSys, dev.id);
  }).join("<hr>");
  const chassis = (d.chassis ?? []).map(renderChassis).join("");
  const mgrs = (dev.profile?.managers ?? []).map(m =>
    `<div class="kv"><div class="k">${t("bmc_fw", esc(m.id))}</div><div class="v">${esc(m.firmware_version)}</div></div>`).join("");
  return `<div class="card">
    <div class="muted" style="margin-bottom:8px">${head}</div>
    ${systems}${chassis}
    ${mgrs ? `<div class="row" style="margin-top:14px">${mgrs}</div>` : ""}
    <details class="profile" style="margin-top:12px"><summary>${t("profile_summary")}</summary>
      <pre>${esc(JSON.stringify(dev.profile, null, 2))}</pre></details>
  </div>`;
}

async function doReset(ev, devId, systemId, type) {
  if (!confirm(t("confirm_reset", systemId, resetLabel(type)))) return;
  const group = document.querySelector(`.power-btns[data-dev="${devId}"]`);
  const msg = group.querySelector(".msg");
  const btns = group.querySelectorAll("button");
  msg.textContent = t("running"); msg.className = "msg";
  // disable every power button in this group while the request is in flight,
  // and pause auto-refresh so the feedback isn't wiped mid-operation
  btns.forEach(b => b.disabled = true);
  pendingOps++;
  try {
    const r = await fetch(`/api/devices/${devId}/reset`, {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({system_id: systemId, reset_type: type})
    });
    if (!r.ok) throw new Error((await r.json()).detail ?? r.status);
    msg.textContent = t("sent", type);
  } catch(e) { msg.textContent = t("failed", e.message); msg.className = "msg err"; }
  finally { btns.forEach(b => b.disabled = false); pendingOps--; }
}

async function addDevice(ev) {
  ev.preventDefault();
  const msg = document.getElementById("add-msg");
  msg.textContent = t("connecting"); msg.className = "msg";
  try {
    const r = await fetch("/api/devices", {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({
        name: document.getElementById("f-name").value,
        host: document.getElementById("f-host").value,
        username: document.getElementById("f-user").value,
        password: document.getElementById("f-pass").value,
      })
    });
    if (!r.ok) throw new Error((await r.json()).detail ?? r.status);
    msg.textContent = t("added"); ev.target.reset(); refresh(true);
  } catch(e) { msg.textContent = t("failed", e.message); msg.className = "msg err"; }
}

// ---------------- BIOS update dialog ----------------
let biosDev = null, biosPolling = null;

function openBiosDialog(devId, version) {
  biosDev = devId;
  const dev = (window._devices ?? []).find(d => d.id === devId);
  document.getElementById("bd-host").textContent = dev ? `${dev.name}(${dev.host})` : `#${devId}`;
  document.getElementById("bd-version").textContent = version;
  const power = dev?.snapshot?.data?.systems?.[0]?.power_state ?? "?";
  document.getElementById("bd-power").textContent = power;
  document.getElementById("bd-power-warn").style.display = power === "Off" ? "none" : "";
  document.getElementById("bd-msg").textContent = "";
  document.getElementById("bd-restore-msg").textContent = "";
  document.getElementById("bd-diff").innerHTML = "";
  document.getElementById("bd-bar-outer").style.display = "none";
  document.getElementById("bd-start").disabled = false;
  document.getElementById("biosDialog").showModal();
  loadBackups();
}

async function loadBackups() {
  const sel = document.getElementById("bd-backup");
  try {
    const list = await (await fetch(`/api/devices/${biosDev}/bios/backups`)).json();
    sel.innerHTML = list.length
      ? list.map(b => `<option value="${esc(b.name)}">${esc(b.name)}(${b.size_kb} KB)</option>`).join("")
      : `<option value="">${t("no_backup_yet")}</option>`;
  } catch(e) { sel.innerHTML = `<option value="">${t("load_backup_failed")}</option>`; }
}

async function biosRestorePreview() {
  const backup = document.getElementById("bd-backup").value;
  const msg = document.getElementById("bd-restore-msg");
  const diffEl = document.getElementById("bd-diff");
  if (!backup) { msg.textContent = t("no_backup_selected"); msg.className = "msg err"; return; }
  msg.textContent = t("comparing"); msg.className = "msg"; diffEl.innerHTML = "";
  try {
    const r = await fetch(`/api/devices/${biosDev}/bios/restore/preview`, {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({backup_file: backup})
    });
    if (!r.ok) throw new Error((await r.json()).detail ?? r.status);
    const d = await r.json();
    if (!d.differences.length) {
      msg.textContent = t("settings_match", d.total_saved);
      return;
    }
    diffEl.innerHTML = `<table>
      <tr><th>${t("col_setting")}</th><th>${t("col_current")}</th><th>${t("col_restore_to")}</th></tr>
      ${d.differences.map(x=>`<tr><td>${esc(x.key)}</td><td>${esc(JSON.stringify(x.current))}</td><td><b>${esc(JSON.stringify(x.saved))}</b></td></tr>`).join("")}
    </table>`;
    msg.textContent = t("diff_count", d.differences.length) +
      (d.skipped.length ? t("diff_skipped", d.skipped.length) : "");
  } catch(e) { msg.textContent = t("compare_failed", e.message); msg.className = "msg err"; }
}

async function biosRestore() {
  const backup = document.getElementById("bd-backup").value;
  const msg = document.getElementById("bd-restore-msg");
  if (!backup) { msg.textContent = t("no_backup_selected"); msg.className = "msg err"; return; }
  if (!confirm(t("confirm_restore", backup))) return;
  msg.textContent = t("restoring"); msg.className = "msg";
  try {
    const r = await fetch(`/api/devices/${biosDev}/bios/restore`, {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({backup_file: backup})
    });
    if (!r.ok) throw new Error((await r.json()).detail ?? r.status);
    const d = await r.json();
    msg.textContent = d.restored ? t("restore_ok", d.message, d.restored) : d.message;
    refresh(true);
  } catch(e) { msg.textContent = t("restore_failed", e.message); msg.className = "msg err"; }
}

function closeBiosDialog() {
  if (biosPolling) { clearInterval(biosPolling); biosPolling = null; }
  document.getElementById("biosDialog").close();
}

async function biosBackupOnly() {
  const msg = document.getElementById("bd-msg");
  msg.textContent = t("backing_up"); msg.className = "msg";
  try {
    const r = await fetch(`/api/devices/${biosDev}/bios/backup`, {method:"POST"});
    if (!r.ok) throw new Error((await r.json()).detail ?? r.status);
    const d = await r.json();
    msg.textContent = t("backup_ok", d.attribute_count, d.backup_file);
    loadBackups(); refresh(true);
  } catch(e) { msg.textContent = t("backup_failed", e.message); msg.className = "msg err"; refresh(true); }
}

async function startBiosUpdate() {
  const fileInput = document.getElementById("bd-file");
  const msg = document.getElementById("bd-msg");
  if (!fileInput.files.length) { msg.textContent = t("select_image_first"); msg.className = "msg err"; return; }
  const dev = (window._devices ?? []).find(d => d.id === biosDev);
  const power = dev?.snapshot?.data?.systems?.[0]?.power_state;
  if (power !== "Off") {
    msg.textContent = t("power_not_off", power ?? t("power_unknown"));
    msg.className = "msg err";
    document.getElementById("bd-power-warn").style.display = "";
    return;
  }
  const f = fileInput.files[0];
  if (!confirm(t("confirm_flash", f.name))) return;

  document.getElementById("bd-start").disabled = true;
  msg.textContent = t("uploading"); msg.className = "msg";
  const form = new FormData();
  form.append("file", f);
  form.append("preserve", document.getElementById("bd-preserve").checked);
  try {
    const r = await fetch(`/api/devices/${biosDev}/bios/update`, {method:"POST", body:form});
    if (!r.ok) throw new Error((await r.json()).detail ?? r.status);
    const d = await r.json();
    msg.textContent = t("upload_done", d.size_mb, d.backup_file ? t("settings_backed_up") : "", d.task_id);
    document.getElementById("bd-bar-outer").style.display = "";
    loadBackups(); refresh(true);
    pollBiosTask(d.task_id);
  } catch(e) {
    msg.textContent = t("update_failed", e.message); msg.className = "msg err";
    document.getElementById("bd-start").disabled = false;
  }
}

function pollBiosTask(taskId) {
  const msg = document.getElementById("bd-msg");
  const bar = document.getElementById("bd-bar");
  biosPolling = setInterval(async () => {
    try {
      const d = await (await fetch(`/api/devices/${biosDev}/bios/task/${taskId}`)).json();
      const pct = parseInt(d.flash_percentage) || d.percent_complete || 0;
      bar.style.width = pct + "%";
      if (d.state === "Completed") {
        clearInterval(biosPolling); biosPolling = null;
        bar.style.width = "100%";
        msg.textContent = t("flash_complete");
        document.getElementById("bd-start").disabled = false;
        refresh(true);
      } else if (d.state === "Exception" || d.status === "Critical") {
        clearInterval(biosPolling); biosPolling = null;
        msg.textContent = t("flash_failed", d.state); msg.className = "msg err";
        document.getElementById("bd-start").disabled = false;
        refresh(true);
      } else if (d.state) {
        msg.textContent = t("flashing", d.state + (pct ? " " + pct + "%" : ""));
      } else {
        msg.textContent = t("bmc_reconnecting");
      }
    } catch(e) { /* transient network error during flash; keep polling */ }
  }, 3000);
}

// ---------------- activity log ----------------
const kindLabel = k => t("kind_" + k) || k;
const statusBadge = s => `<span class="badge ${s==="success"?"ok":(s==="running"?"warn":"crit")}">${t("st_" + s)}</span>`;
// New rows carry msg_code + msg_params (i18n); legacy rows only have message text
const activityMessage = a => a.msg_code ? t(a.msg_code, ...(a.msg_params ?? [])) : (a.message ?? "");

function renderActivities(acts) {
  const card = document.getElementById("activityCard");
  if (!acts.length) { card.style.display = "none"; return; }
  card.style.display = "";
  document.getElementById("activityTable").innerHTML =
    `<tr><th>${t("col_time")}</th><th>${t("col_device")}</th><th>${t("col_action")}</th><th>${t("col_status")}</th><th>${t("col_message")}</th></tr>` +
    acts.map(a => `<tr>
      <td style="white-space:nowrap">${new Date(a.updated*1000).toLocaleString()}</td>
      <td>${esc(a.device_name)}</td>
      <td>${esc(kindLabel(a.kind))}</td>
      <td>${statusBadge(a.status)}</td>
      <td>${esc(activityMessage(a))}</td>
    </tr>`).join("");
}

// ---------------- Event log dialog ----------------
let logDev = null;

async function openLogDialog(devId) {
  logDev = devId;
  const dev = (window._devices ?? []).find(d => d.id === devId);
  document.getElementById("ld-host").textContent = dev ? `${dev.name}(${dev.host})` : `#${devId}`;
  document.getElementById("ld-msg").textContent = "";
  document.getElementById("ld-table").innerHTML = "";
  document.getElementById("logDialog").showModal();
  const sel = document.getElementById("ld-service");
  const services = (dev?.profile?.log_services ?? []);
  sel.innerHTML = services.length
    ? services.map(s => `<option value="${esc(s.path)}">${esc(s.name)}(${esc(s.owner)})</option>`).join("")
    : `<option value="">${t("no_log_services")}</option>`;
  const selIdx = services.findIndex(s => /SEL/i.test(s.id ?? "") || /SEL/i.test(s.name ?? ""));
  if (selIdx >= 0) sel.selectedIndex = selIdx;
  if (services.length) loadLogEntries();
}

function closeLogDialog() { document.getElementById("logDialog").close(); }

const SEV_BADGE = s => `<span class="badge ${s==="OK"?"ok":(s==="Warning"?"warn":(s?"crit":"off"))}">${esc(s)}</span>`;

async function loadLogEntries() {
  const service = document.getElementById("ld-service").value;
  const msg = document.getElementById("ld-msg");
  const table = document.getElementById("ld-table");
  if (!service) return;
  msg.textContent = t("loading"); msg.className = "msg";
  try {
    const r = await fetch(`/api/devices/${logDev}/logs/entries?service=${encodeURIComponent(service)}&limit=100`);
    if (!r.ok) throw new Error((await r.json()).detail ?? r.status);
    const d = await r.json();
    msg.textContent = t("log_summary", d.total, d.entries.length);
    table.innerHTML = `<tr><th>#</th><th>${t("col_time")}</th><th>${t("col_severity")}</th><th>${t("col_sensor_type")}</th><th>${t("col_event")}</th></tr>` +
      d.entries.map(e => `<tr title="${esc(e.message)}">
        <td>${esc(e.id)}</td>
        <td style="white-space:nowrap">${e.created ? new Date(e.created).toLocaleString() : "–"}</td>
        <td>${SEV_BADGE(e.severity)}</td>
        <td>${esc(e.sensor_type)}</td>
        <td>${esc(e.event ?? e.message.slice(0,80))}${e.entry_code && e.entry_code !== "Assert" ? `(${esc(e.entry_code)})` : ""}</td>
      </tr>`).join("");
  } catch(e) { msg.textContent = t("load_failed", e.message); msg.className = "msg err"; }
}

async function clearLog() {
  const service = document.getElementById("ld-service").value;
  const name = document.getElementById("ld-service").selectedOptions[0]?.textContent;
  const msg = document.getElementById("ld-msg");
  if (!service) return;
  if (!confirm(t("confirm_clear", name))) return;
  msg.textContent = t("clearing"); msg.className = "msg";
  try {
    const r = await fetch(`/api/devices/${logDev}/logs/clear`, {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({service})
    });
    if (!r.ok) throw new Error((await r.json()).detail ?? r.status);
    msg.textContent = t("cleared");
    refresh(true); loadLogEntries();
  } catch(e) { msg.textContent = t("clear_failed", e.message); msg.className = "msg err"; }
}

// ---------------- main refresh ----------------
// Auto-refresh replaces #app wholesale, which would collapse open <details>,
// reset scroll inside tables, and wipe in-flight operation feedback. So a
// background tick still fetches fresh data (for open dialogs) but skips the
// DOM re-render while the user is interacting. Manual refreshes force render.
let pendingOps = 0;      // in-flight power/BIOS operations
let appHovered = false;  // pointer currently over the content area

function renderPaused() {
  return pendingOps > 0 || appHovered || !!document.querySelector("#app details[open]");
}

async function refresh(force = false) {
  let devices, activities;
  try {
    [devices, activities] = await Promise.all([
      (await fetch("/api/devices")).json(),
      (await fetch("/api/activities")).json(),
    ]);
  } catch(e) {
    if (force || !window._devices) {
      document.getElementById("app").innerHTML = `<div class="card err">${t("backend_unreachable", e.message)}</div>`;
    }
    return;
  }
  window._devices = devices;  // keep data fresh for open dialogs even when paused
  if (!force && renderPaused()) {
    document.getElementById("lastUpdate").textContent = t("paused_hint");
    return;
  }
  document.getElementById("app").innerHTML =
    devices.length ? devices.map(renderDevice).join("") : `<div class="card muted">${t("no_devices")}</div>`;
  renderActivities(activities);
  document.getElementById("lastUpdate").textContent =
    t("updated_at", new Date().toLocaleTimeString(lang === "en" ? "en-US" : "zh-TW"));
}

applyStatic();
const appEl = document.getElementById("app");
appEl.innerHTML = `<div class="card muted">${t("loading")}</div>`;
appEl.addEventListener("mouseenter", () => appHovered = true);
appEl.addEventListener("mouseleave", () => appHovered = false);
refresh(true);
setInterval(() => refresh(), 15000);
</script>
